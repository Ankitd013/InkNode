name: Build Compact Offline Release Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static parted rsync xz-utils

      - name: Download Pi OS Lite
        run: |
          wget --content-disposition https://downloads.raspberrypi.org/raspios_lite_armhf_latest
          xz -d *.xz
          mv *.img base_os.img

      - name: Expand Image Temporarily
        run: |
          dd if=/dev/zero bs=1M count=1500 >> base_os.img
          sudo parted -s base_os.img resizepart 2 100%
          
          LOOP_DEV=$(sudo losetup --show -f -P base_os.img)
          sudo e2fsck -f -y ${LOOP_DEV}p2
          sudo resize2fs ${LOOP_DEV}p2
          sudo losetup -d ${LOOP_DEV}

      - name: Inject Cloud-Init and Bake Application
        run: |
          LOOP_DEV=$(sudo losetup --show -f -P base_os.img)
          sudo mkdir -p /mnt/rootfs
          sudo mount ${LOOP_DEV}p2 /mnt/rootfs
          sudo mkdir -p /mnt/rootfs/boot/firmware
          sudo mount ${LOOP_DEV}p1 /mnt/rootfs/boot/firmware
          
          # 1. THE CLOUD-INIT FIX: Natively provision the OS on first boot
          cat << 'EOF' | sudo tee /mnt/rootfs/boot/firmware/user-data > /dev/null
          #cloud-config
          hostname: inknode
          manage_etc_hosts: true
          timezone: Asia/Kolkata
          users:
            - name: "inknode"
              groups: users,adm,dialout,audio,netdev,video,plugdev,cdrom,games,input,gpio,spi,i2c,render,sudo
              shell: /bin/bash
              lock_passwd: false
              sudo: ALL=(ALL) NOPASSWD:ALL
          chpasswd:
            expire: false
            users:
              - { name: inknode, password: raspberry, type: text }
          rpi:
            spi: true
            i2c: true
          enable_ssh: true
          runcmd:
            - raspi-config nonint do_wifi_country IN
            - raspi-config nonint do_i2c 0
            - raspi-config nonint do_spi 0
          EOF

          # 2. THE NETWORK-CONFIG FIX: Unlocks the Wi-Fi radio for the Captive Portal
          cat << 'EOF' | sudo tee /mnt/rootfs/boot/firmware/network-config > /dev/null
          version: 2
          ethernets:
            eth0:
              dhcp4: true
              optional: true
          EOF
          
          echo "dtparam=i2c_arm=on" | sudo tee -a /mnt/rootfs/boot/firmware/config.txt
          echo "dtparam=spi=on" | sudo tee -a /mnt/rootfs/boot/firmware/config.txt
          echo "i2c-dev" | sudo tee /etc/modules-load.d/i2c.conf > /dev/null
          
          # 3. Mount system binds for chroot
          sudo cp /usr/bin/qemu-arm-static /mnt/rootfs/usr/bin/
          for dir in /dev /dev/pts /proc /sys /run; do sudo mount --bind $dir /mnt/rootfs$dir; done
          
          # 4. Copy InkNode Code
          sudo mkdir -p /mnt/rootfs/opt/InkNode
          sudo rsync -a --exclude='base_os.img' --exclude='.git' . /mnt/rootfs/opt/InkNode
          
          # 5. Create Systemd Service
          sudo printf '[Unit]\nDescription=InkNode E-Paper Dashboard Service\nAfter=network.target\n\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/opt/InkNode\nExecStart=/opt/InkNode/venv/bin/python /opt/InkNode/boot_manager.py\nRestart=on-failure\nRestartSec=10\n\n[Install]\nWantedBy=multi-user.target\n' | sudo tee /mnt/rootfs/etc/systemd/system/epaper-dash.service > /dev/null
          
          # 6. Install Dependencies inside Chroot
          sudo chroot /mnt/rootfs /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y python3-venv python3-pip libopenjp2-7 libtiff6 network-manager fonts-dejavu i2c-tools libfreetype6
            
            cd /opt/InkNode
            python3 -m venv venv
            venv/bin/pip install --upgrade pip
            venv/bin/pip install -r requirements.txt
            
            # THE FIX: Force compilation natively inside the target architecture
            venv/bin/pip install --force-reinstall --no-binary :all: charset-normalizer
            systemctl enable epaper-dash.service
          "
          
          # Cleanup
          for dir in /run /sys /proc /dev/pts /dev; do sudo umount /mnt/rootfs$dir; done
          sudo umount /mnt/rootfs/boot/firmware
          sudo umount /mnt/rootfs
          sudo losetup -d ${LOOP_DEV}

      - name: Shrink Image to Fit Actual Data Only
        run: |
          echo "🧹 Trimming unused virtual space..."
          LOOP_DEV=$(sudo losetup --show -f -P base_os.img)
          
          sudo e2fsck -f -y ${LOOP_DEV}p2
          sudo resize2fs -M ${LOOP_DEV}p2
          
          BLOCK_INFO=$(sudo dumpe2fs -h ${LOOP_DEV}p2 2>&1)
          BLOCK_COUNT=$(echo "$BLOCK_INFO" | grep "Block count:" | awk '{print $3}')
          BLOCK_SIZE=$(echo "$BLOCK_INFO" | grep "Block size:" | awk '{print $3}')
          FS_SIZE_BYTES=$((BLOCK_COUNT * BLOCK_SIZE))
          
          PART_START_BYTES=$(sudo parted -s base_os.img unit B print | grep -E "^\s*2\s" | awk '{print $2}' | tr -d 'B')
          NEW_END_BYTES=$((PART_START_BYTES + FS_SIZE_BYTES))
          
          echo "Yes" | sudo parted ---pretend-input-tty base_os.img resizepart 2 ${NEW_END_BYTES}B
          
          sudo losetup -d ${LOOP_DEV}
          
          FINAL_IMAGE_SIZE=$((NEW_END_BYTES + 1024 * 1024 * 10))
          sudo truncate -s $FINAL_IMAGE_SIZE base_os.img

      - name: Deep Algorithmic Compression (XZ)
        run: |
          echo "⚡ Launching multi-threaded LZMA2 encoder..."
          xz -9 -T0 base_os.img
          mv base_os.img.xz inknode-offline-os-${{ github.ref_name }}.img.xz

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: inknode-offline-os-${{ github.ref_name }}.img.xz
          name: InkNode OS ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}